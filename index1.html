<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PlayMatch — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:        #2A5FA5;
    --blue-dark:   #1E4580;
    --blue-light:  #4A7EC7;
    --blue-glow:   rgba(42, 95, 165, .18);
    --bg:          #F4F6FA;
    --card:        #FFFFFF;
    --text:        #1A202C;
    --muted:       #718096;
    --border:      #E2E8F0;
    --red:         #EF4444;
    --font:        'Plus Jakarta Sans', sans-serif;
  }

  html, body {
    min-height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* tela principal */
  .tela {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* fundo azul do topo */
  .fundo-topo {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 280px;
    background: linear-gradient(145deg, var(--blue-dark) 0%, var(--blue) 55%, var(--blue-light) 100%);
    border-radius: 0 0 48px 48px;
    z-index: 0;
    overflow: hidden;
  }
  .fundo-topo::before {
    content: '';
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.08);
    top: -80px; right: -60px;
  }
  .fundo-topo::after {
    content: '';
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.06);
    bottom: 30px; left: -30px;
  }
  .brilho-fundo {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% -10%, rgba(255,255,255,.15) 0%, transparent 60%);
  }

  /* area central */
  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 40px;
    flex: 1;
  }

  /* logo e nome do app */
  .area-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 64px;
    margin-bottom: 32px;
  }
  .icone-logo {
    width: 68px; height: 68px;
    background: rgba(255,255,255,.18);
    border: 2px solid rgba(255,255,255,.3);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    margin-bottom: 14px;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px rgba(0,0,0,.15);
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .nome-app {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    animation: subirFade .45s .1s ease both;
  }
  .nome-app span { color: rgba(255,255,255,.7); }
  .slogan-app {
    font-size: 14.5px;
    color: rgba(255,255,255,.72);
    font-weight: 500;
    margin-top: 4px;
    animation: subirFade .45s .18s ease both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.7); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes subirFade {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* caixa do formulario */
  .caixa-login {
    width: 100%;
    background: var(--card);
    border-radius: 24px;
    padding: 28px 24px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,.10);
    border: 1.5px solid var(--border);
    animation: subirFade .5s .22s ease both;
  }

  /* campos do formulario */
  .campo {
    margin-bottom: 16px;
  }
  .campo label {
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 7px;
  }
  .caixa-input {
    position: relative;
  }
  .caixa-input svg {
    position: absolute;
    left: 14px; top: 50%; transform: translateY(-50%);
    width: 17px; height: 17px;
    color: var(--muted);
    pointer-events: none;
    transition: color .2s;
  }
  .caixa-input input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: var(--bg);
    font-family: var(--font);
    font-size: 14.5px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .caixa-input input::placeholder { color: #A0AEC0; }
  .caixa-input input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-glow);
    background: #fff;
  }
  .caixa-input input:focus + svg,
  .caixa-input:focus-within svg { color: var(--blue); }

  /* botao olho de senha */
  .btn-olho {
    position: absolute;
    right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    padding: 2px;
    color: var(--muted);
    display: flex; align-items: center;
    transition: color .2s;
  }
  .btn-olho:hover { color: var(--blue); }
  .btn-olho svg { width: 17px; height: 17px; }

  .linha-esqueceu {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .link-esqueceu {
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    text-decoration: none;
    transition: opacity .2s;
  }
  .link-esqueceu:hover { opacity: .75; }

  /* botao entrar */
  .btn-entrar {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, var(--blue-light) 100%);
    color: #fff;
    font-family: var(--font);
    font-size: 15.5px;
    font-weight: 700;
    letter-spacing: -.1px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(42,95,165,.38);
    transition: transform .18s, box-shadow .18s, opacity .18s;
    margin-top: 6px;
  }
  .btn-entrar:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(42,95,165,.45);
  }
  .btn-entrar:active { transform: scale(.98); opacity: .9; }

  /* divisor ou entre com */
  .separador {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0 18px;
  }
  .linha-separador {
    flex: 1;
    height: 1.5px;
    background: var(--border);
    border-radius: 50px;
  }
  .texto-separador {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
  }

  /* botoes de login social */
  .grade-social {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn-rede {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 10px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: var(--card);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: border-color .2s, box-shadow .2s, transform .15s;
  }
  .btn-rede:hover {
    border-color: #CBD5E0;
    box-shadow: 0 3px 12px rgba(0,0,0,.08);
    transform: translateY(-1px);
  }
  .btn-rede:active { transform: scale(.97); }
  .btn-rede svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* link de cadastro */
  .linha-cadastro {
    text-align: center;
    margin-top: 22px;
    font-size: 13.5px;
    color: var(--muted);
    font-weight: 500;
    animation: subirFade .5s .3s ease both;
  }
  .linha-cadastro a {
    color: var(--blue);
    font-weight: 700;
    text-decoration: none;
    transition: opacity .2s;
  }
  .linha-cadastro a:hover { opacity: .75; }
</style>
</head>
<body>
<div class="tela">

  <!-- fundo azul -->
  <div class="fundo-topo"><div class="brilho-fundo"></div></div>

  <main>
    <!-- logo -->
    <div class="area-logo">
      <div class="icone-logo">⚽</div>
      <div class="nome-app">Play<span>Match</span></div>
      <div class="slogan-app">Bora jogar? 🏃</div>
    </div>

    <!-- formulario de login -->
    <div class="caixa-login">

      <!-- email -->
      <div class="campo">
        <label>E-mail</label>
        <div class="caixa-input">
          <input type="email" placeholder="seu@email.com" autocomplete="email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>

      <!-- senha -->
      <div class="campo">
        <label>Senha</label>
        <div class="caixa-input">
          <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button class="btn-olho" onclick="togglePwd()" type="button" aria-label="Mostrar senha">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="linha-esqueceu">
          <a href="#" class="link-esqueceu">Esqueceu a senha?</a>
        </div>
      </div>

      <!-- botao entrar -->
      <button class="btn-entrar" type="button">Entrar</button>

      <!-- divisor -->
      <div class="separador">
        <div class="linha-separador"></div>
        <span class="texto-separador">ou entre com</span>
        <div class="linha-separador"></div>
      </div>

      <!-- login social -->
      <div class="grade-social">

        <!-- google -->
        <button class="btn-rede" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <!-- apple -->
        <button class="btn-rede" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          Apple
        </button>

        <!-- facebook -->
        <button class="btn-rede" type="button">
          <svg viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </button>

        <!-- microsoft -->
        <button class="btn-rede" type="button">
          <svg viewBox="0 0 24 24">
            <path fill="#F25022" d="M1 1h10.5v10.5H1z"/>
            <path fill="#7FBA00" d="M12.5 1H23v10.5H12.5z"/>
            <path fill="#00A4EF" d="M1 12.5h10.5V23H1z"/>
            <path fill="#FFB900" d="M12.5 12.5H23V23H12.5z"/>
          </svg>
          Microsoft
        </button>

      </div>
    </div>

    <!-- link pra criar conta -->
    <p class="linha-cadastro">Ainda não tem conta? <a href="#">Criar conta</a></p>

  </main>
</div>

<script>
  function togglePwd() {
    const input = document.getElementById('pwd');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>
</body>
</html>
