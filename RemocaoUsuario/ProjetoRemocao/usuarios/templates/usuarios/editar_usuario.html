<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário - PlayMatch</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #205e9e 0%, #6f7890 55%, #f45a16 100%);
            min-height: 100vh;
            color: #111;
        }

        .top {
            text-align: center;
            color: white;
            padding: 50px 20px 90px;
        }

        .logo {
            width: 86px;
            height: 86px;
            border-radius: 22px;
            background: white;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        }

        .top h1 {
            font-size: 30px;
            margin-bottom: 8px;
        }

        .top p {
            opacity: 0.9;
        }

        .container {
            max-width: 460px;
            margin: -55px auto 80px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
        }

        h2 {
            text-align: center;
            color: #205e9e;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #ddd;
            background: #f4f4f6;
            font-size: 15px;
        }

        button {
            width: 100%;
            margin-top: 28px;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: #205e9e;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        .secondary {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #f45a16;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <section class="top">
        <div class="logo">👤</div>
        <h1>Editar Perfil</h1>
        <p>Atualize suas informações no PlayMatch</p>
    </section>

    <main class="container">
        <div class="card">
            <h2>Dados do usuário</h2>

            <form>
                <label>Nome</label>
                <input type="text" value="João Silva">

                <label>E-mail</label>
                <input type="email" value="joao@email.com">

                <label>Senha</label>
                <input type="password" value="123456">

                <button type="submit">Salvar alterações</button>
            </form>

            <a class="secondary" href="/usuarios/remover-usuario/">Remover conta</a>
        </div>
    </main>

</body>
</html>
