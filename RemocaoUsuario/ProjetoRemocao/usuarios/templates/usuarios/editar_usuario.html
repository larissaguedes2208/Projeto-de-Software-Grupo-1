{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PlayMatch - Editar perfil</title>

    <link
        rel="stylesheet"
        href="{% static 'usuarios/style.css' %}"
    >
</head>

<body>

<header class="header">
    <h1>Editar perfil</h1>

    <p>
        Atualize seus dados pessoais.
    </p>
</header>

<main class="container">

    <section class="profile">

        <div class="user-avatar">
            JS
        </div>

        <h2>João Silva</h2>

        <p>
            Jogador PlayMatch
        </p>

    </section>

    <section class="card">

        <h2>Seus dados</h2>

        <form method="POST">
            {% csrf_token %}

            <label for="nome">
                Nome
            </label>

            <input
                type="text"
                id="nome"
                name="nome"
                value="João Silva"
                required
            >

            <label for="email">
                E-mail
            </label>

            <input
                type="email"
                id="email"
                name="email"
                value="joao@email.com"
                required
            >

            <label for="senha">
                Nova senha
            </label>

            <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Preencha apenas se quiser alterar"
            >

            <button type="submit">
                Salvar alterações
            </button>
        </form>

        <a
            href="{% url 'remover_usuario' %}"
            class="btn red"
        >
            Remover minha conta
        </a>

        <a
            href="{% url 'listar_partidas' %}"
            class="btn btn-secundario"
        >
            Voltar para o início
        </a>

    </section>

</main>

<nav class="bottom-nav">

    <a href="{% url 'listar_partidas' %}">
        🏠
        <span>Início</span>
    </a>

    <a href="{% url 'buscar_partidas' %}">
        🔎
        <span>Buscar</span>
    </a>

    <a href="{% url 'criar_partida' %}">
        ➕
        <span>Criar</span>
    </a>

    <a
        href="{% url 'editar_usuario' %}"
        class="active"
    >
        👤
        <span>Perfil</span>
    </a>

</nav>

</body>
</html>
