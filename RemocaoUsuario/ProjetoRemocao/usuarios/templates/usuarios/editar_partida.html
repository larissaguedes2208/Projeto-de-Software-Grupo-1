{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PlayMatch - Editar partida</title>

    <link
        rel="stylesheet"
        href="{% static 'usuarios/style.css' %}"
    >
</head>

<body>

<header class="header">
    <h1>Editar partida</h1>

    <p>
        Altere as informações necessárias.
    </p>
</header>

<main class="container">

    <section class="card">
        <span class="badge">
            Partida #{{ partida.id }}
        </span>

        <h2>{{ partida.esporte }}</h2>

        <form method="POST">
            {% csrf_token %}

            <label for="esporte">
                Esporte
            </label>

            <input
                type="text"
                id="esporte"
                name="esporte"
                value="{{ partida.esporte }}"
                required
            >

            <label for="local">
                Local
            </label>

            <input
                type="text"
                id="local"
                name="local"
                value="{{ partida.local }}"
                required
            >

            <label for="cidade">
                Cidade
            </label>

            <input
                type="text"
                id="cidade"
                name="cidade"
                value="{{ partida.cidade }}"
                required
            >

            <label for="data">
                Data
            </label>

            <input
                type="date"
                id="data"
                name="data"
                value="{{ partida.data|date:'Y-m-d' }}"
                required
            >

            <label for="horario">
                Horário
            </label>

            <input
                type="time"
                id="horario"
                name="horario"
                value="{{ partida.horario|time:'H:i' }}"
                required
            >

            <label for="num_jogadores">
                Número de jogadores
            </label>

            <input
                type="number"
                id="num_jogadores"
                name="num_jogadores"
                min="2"
                value="{{ partida.num_jogadores }}"
                required
            >

            <label for="status">
                Status
            </label>

            <select
                id="status"
                name="status"
            >
                <option
                    value="Aberta"
                    {% if partida.status == 'Aberta' %}selected{% endif %}
                >
                    Aberta
                </option>

                <option
                    value="Lotada"
                    {% if partida.status == 'Lotada' %}selected{% endif %}
                >
                    Lotada
                </option>

                <option
                    value="Cancelada"
                    {% if partida.status == 'Cancelada' %}selected{% endif %}
                >
                    Cancelada
                </option>
            </select>

            <button type="submit">
                Salvar alterações
            </button>
        </form>

        <a
            href="{% url 'listar_partidas' %}"
            class="btn btn-secundario"
        >
            Cancelar e voltar
        </a>
    </section>

</main>

<nav class="bottom-nav">

    <a href="{% url 'listar_partidas' %}">
        🏠
        <span>Início</span>
    </a>

    <a href="{% url 'buscar_partidas' %}">
        🔎
        <span>Buscar</span>
    </a>

    <a href="{% url 'criar_partida' %}">
        ➕
        <span>Criar</span>
    </a>

    <a href="{% url 'editar_usuario' %}">
        👤
        <span>Perfil</span>
    </a>

</nav>

</body>
</html>
