<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Excluir Partida</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #205e9e, #f45a16);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 480px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #d62828;
        }

        p {
            font-size: 17px;
        }

        button {
            padding: 14px 22px;
            background: #d62828;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        a {
            display: block;
            margin-top: 18px;
            color: #205e9e;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Excluir partida</h1>

    <p>Tem certeza que deseja excluir a partida de <strong>{{ partida.esporte }}</strong>?</p>
    <p>{{ partida.local }} - {{ partida.cidade }}</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Sim, excluir partida</button>
    </form>

    <a href="{% url 'listar_partidas' %}">Cancelar</a>
</div>

</body>
</html>
