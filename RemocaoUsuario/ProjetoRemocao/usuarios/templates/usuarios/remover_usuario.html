<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Remover Usuário - PlayMatch</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #205e9e 0%, #6f7890 55%, #f45a16 100%);
            min-height: 100vh;
            color: #111;
        }

        .top {
            text-align: center;
            color: white;
            padding: 55px 20px 95px;
        }

        .icon {
            width: 86px;
            height: 86px;
            border-radius: 22px;
            background: white;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        }

        .top h1 {
            font-size: 30px;
            margin-bottom: 8px;
        }

        .top p {
            opacity: 0.9;
        }

        .container {
            max-width: 460px;
            margin: -55px auto 80px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            text-align: center;
        }

        h2 {
            color: #205e9e;
            margin-bottom: 15px;
        }

        .warning {
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .user-box {
            background: #f4f4f6;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 25px;
        }

        .user-box strong {
            color: #f45a16;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            text-align: center;
            margin-top: 12px;
            cursor: pointer;
        }

        .cancelar {
            background: #205e9e;
            color: white;
        }

        .remover {
            background: #f45a16;
            color: white;
        }
    </style>
</head>

<body>

    <section class="top">
        <div class="icon">🗑</div>
        <h1>Remover Conta</h1>
        <p>Confirme antes de continuar</p>
    </section>

    <main class="container">
        <div class="card">
            <h2>Excluir usuário</h2>

            <p class="warning">
                Tem certeza que deseja remover este usuário? Essa ação não poderá ser desfeita.
            </p>

            <div class="user-box">
                Usuário selecionado:<br>
                <strong>João Silva</strong>
            </div>

            <a href="/usuarios/editar-usuario/" class="btn cancelar">Cancelar</a>
            <button class="btn remover">Remover usuário</button>
        </div>
    </main>

</body>
</html>
