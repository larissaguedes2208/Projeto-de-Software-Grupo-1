{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PlayMatch - Remover conta</title>

    <link
        rel="stylesheet"
        href="{% static 'usuarios/style.css' %}"
    >
</head>

<body>

<header class="header">
    <h1>Remover conta</h1>

    <p>
        Confirme antes de continuar.
    </p>
</header>

<main class="container">

    <section class="card">

        <span class="badge">
            Atenção
        </span>

        <h2>Tem certeza?</h2>

        <p class="info">
            Ao remover sua conta, seus dados poderão ser excluídos do sistema.
        </p>

        <p>
            <strong>Usuário:</strong>
            João Silva
        </p>

        <p>
            <strong>E-mail:</strong>
            joao@email.com
        </p>

        <form method="POST">
            {% csrf_token %}

            <button
                type="submit"
                class="btn-vermelho"
            >
                Sim, remover minha conta
            </button>
        </form>

        <a
            href="{% url 'editar_usuario' %}"
            class="btn btn-secundario"
        >
            Cancelar
        </a>

    </section>

</main>

<nav class="bottom-nav">

    <a href="{% url 'listar_partidas' %}">
        🏠
        <span>Início</span>
    </a>

    <a href="{% url 'buscar_partidas' %}">
        🔎
        <span>Buscar</span>
    </a>

    <a href="{% url 'criar_partida' %}">
        ➕
        <span>Criar</span>
    </a>

    <a href="{% url 'editar_usuario' %}">
        👤
        <span>Perfil</span>
    </a>

</nav>

</body>
</html>
