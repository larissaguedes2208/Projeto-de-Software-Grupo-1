{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PlayMatch - Criar partida</title>

    <link
        rel="stylesheet"
        href="{% static 'usuarios/style.css' %}"
    >
</head>

<body>

<header class="header">
    <h1>Criar partida</h1>

    <p>
        Preencha os dados para organizar um novo jogo.
    </p>
</header>

<main class="container">

    <section class="card">
        <h2>Nova partida</h2>

        <p class="info">
            Informe o esporte, local, data e demais informações.
        </p>

        <form method="POST">
            {% csrf_token %}

            <label for="esporte">
                Esporte
            </label>

            <input
                type="text"
                id="esporte"
                name="esporte"
                placeholder="Ex.: Futebol"
                required
            >

            <label for="local">
                Local
            </label>

            <input
                type="text"
                id="local"
                name="local"
                placeholder="Ex.: Campo do Aterro"
                required
            >

            <label for="cidade">
                Cidade
            </label>

            <input
                type="text"
                id="cidade"
                name="cidade"
                placeholder="Ex.: Rio de Janeiro"
                required
            >

            <label for="data">
                Data
            </label>

            <input
                type="date"
                id="data"
                name="data"
                required
            >

            <label for="horario">
                Horário
            </label>

            <input
                type="time"
                id="horario"
                name="horario"
                required
            >

            <label for="num_jogadores">
                Número de jogadores
            </label>

            <input
                type="number"
                id="num_jogadores"
                name="num_jogadores"
                min="2"
                placeholder="Ex.: 10"
                required
            >

            <label for="status">
                Status
            </label>

            <select
                id="status"
                name="status"
            >
                <option value="Aberta">
                    Aberta
                </option>

                <option value="Lotada">
                    Lotada
                </option>

                <option value="Cancelada">
                    Cancelada
                </option>
            </select>

            <button
                type="submit"
                class="btn-laranja"
            >
                Criar partida
            </button>
        </form>

        <a
            href="{% url 'listar_partidas' %}"
            class="btn btn-secundario"
        >
            Voltar para o início
        </a>
    </section>

</main>

<nav class="bottom-nav">

    <a href="{% url 'listar_partidas' %}">
        🏠
        <span>Início</span>
    </a>

    <a href="{% url 'buscar_partidas' %}">
        🔎
        <span>Buscar</span>
    </a>

    <a
        href="{% url 'criar_partida' %}"
        class="active"
    >
        ➕
        <span>Criar</span>
    </a>

    <a href="{% url 'editar_usuario' %}">
        👤
        <span>Perfil</span>
    </a>

</nav>

</body>
</html>
