<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayMatch — Notificações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  /* reset e variaveis */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul:        #2A5FA5;
    --azul-escuro: #1E4580;
    --azul-claro:  #4A7EC7;
    --laranja:     #F26419;
    --vermelho:    #EF4444;
    --verde:       #22C55E;
    --amarelo:     #F59E0B;
    --roxo:        #7C3AED;
    --fundo:       #F4F6FA;
    --branco:      #FFFFFF;
    --texto:       #1A202C;
    --cinza:       #718096;
    --borda:       #E2E8F0;
    --fonte:       'Plus Jakarta Sans', sans-serif;
    --altura-nav:  68px;
  }

  html, body {
    font-family: var(--fonte);
    background: var(--fundo);
    color: var(--texto);
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }

  .tela {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--fundo);
    position: relative;
    overflow-x: hidden;
    padding-bottom: calc(var(--altura-nav) + 16px);
  }

  /* cabecalho azul */
  .cabecalho {
    background: linear-gradient(145deg, var(--azul-escuro) 0%, var(--azul) 60%, var(--azul-claro) 100%);
    padding: 52px 20px 60px;
    position: relative;
    overflow: hidden;
  }
  .cabecalho::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% -20%, rgba(255,255,255,.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .cabecalho::after {
    content: '';
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.08);
    top: -60px; right: -40px;
    pointer-events: none;
  }
  .cabecalho-interno {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .botao-voltar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,.18);
    border: 1.5px solid rgba(255,255,255,.28);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: background .2s;
  }
  .botao-voltar:hover { background: rgba(255,255,255,.28); }
  .botao-voltar svg { width: 18px; height: 18px; color: #fff; }

  .cabecalho-titulo { flex: 1; }
  .cabecalho-titulo h1 {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -.3px;
  }
  .cabecalho-titulo p {
    font-size: 13px;
    color: rgba(255,255,255,.72);
    font-weight: 500;
    margin-top: 2px;
  }

  /* badge de nao lidas no cabecalho */
  .badge-nao-lidas {
    background: var(--laranja);
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    min-width: 28px;
    height: 28px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    border: 2px solid rgba(255,255,255,.3);
    transition: transform .2s;
  }
  .badge-nao-lidas.zerado {
    background: rgba(255,255,255,.2);
  }

  /* conteudo */
  .conteudo {
    padding: 0 16px;
    margin-top: -30px;
  }

  /* barra de acoes no topo */
  .barra-acoes {
    background: var(--branco);
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    border: 1.5px solid var(--borda);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .texto-resumo {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--cinza);
  }
  .texto-resumo strong {
    color: var(--texto);
    font-weight: 800;
  }

  .botao-marcar-todas {
    padding: 8px 14px;
    border-radius: 50px;
    border: 1.5px solid var(--azul);
    background: transparent;
    color: var(--azul);
    font-family: var(--fonte);
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s, color .2s;
    flex-shrink: 0;
  }
  .botao-marcar-todas:hover { background: #EBF2FF; }
  .botao-marcar-todas:disabled {
    opacity: .45;
    cursor: default;
  }

  /* filtros de lida/nao lida */
  .filtros-notificacao {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .filtro-btn {
    padding: 7px 16px;
    border-radius: 50px;
    border: 1.5px solid var(--borda);
    background: var(--branco);
    font-family: var(--fonte);
    font-size: 13px;
    font-weight: 600;
    color: var(--cinza);
    cursor: pointer;
    transition: all .2s;
  }
  .filtro-btn.ativo {
    background: var(--azul);
    border-color: var(--azul);
    color: #fff;
    box-shadow: 0 4px 12px rgba(42,95,165,.3);
  }
  .filtro-btn:not(.ativo):hover {
    border-color: var(--azul);
    color: var(--azul);
  }

  /* lista de notificacoes */
  .lista-notificacoes { display: flex; flex-direction: column; gap: 8px; }

  /* cartao de notificacao */
  .notificacao {
    background: var(--branco);
    border-radius: 16px;
    padding: 14px;
    border: 1.5px solid var(--borda);
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .notificacao:hover { box-shadow: 0 6px 20px rgba(0,0,0,.09); transform: translateY(-1px); }
  .notificacao:active { transform: scale(.98); }

  /* notificacao nao lida tem fundo levemente azulado */
  .notificacao.nao-lida {
    background: #F0F5FF;
    border-color: #C7D9F5;
  }

  /* risco azul na lateral esquerda pra nao lida */
  .notificacao.nao-lida::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
    background: var(--azul);
  }

  /* animacao de entrada */
  .notificacao.entrando {
    animation: entrarNotificacao .3s ease both;
  }
  @keyframes entrarNotificacao {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* animacao quando marca como lida */
  .notificacao.lendo {
    animation: marcarLida .4s ease forwards;
  }
  @keyframes marcarLida {
    0%   { background: #DBEAFE; }
    100% { background: var(--branco); }
  }

  /* icone da notificacao */
  .icone-notificacao {
    width: 44px; height: 44px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  /* cores dos icones por tipo */
  .tipo-jogador  { background: #EBF2FF; }
  .tipo-confirma { background: #DCFCE7; }
  .tipo-vaga     { background: #FEF3C7; }
  .tipo-cancela  { background: #FEE2E2; }
  .tipo-convite  { background: #F3E8FF; }
  .tipo-lembrete { background: #FFF0E6; }

  /* corpo do texto da notificacao */
  .corpo-notificacao { flex: 1; }

  .titulo-notificacao {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -.15px;
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .notificacao.nao-lida .titulo-notificacao { color: var(--azul-escuro); }

  .descricao-notificacao {
    font-size: 12.5px;
    color: var(--cinza);
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 6px;
  }

  .horario-notificacao {
    font-size: 11.5px;
    color: var(--cinza);
    font-weight: 600;
  }

  /* ponto indicador de nao lida */
  .ponto-nao-lida {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--azul);
    flex-shrink: 0;
    margin-top: 4px;
    box-shadow: 0 0 0 3px rgba(42,95,165,.15);
  }
  .notificacao.lida .ponto-nao-lida { visibility: hidden; }

  /* aviso de lista vazia */
  .aviso-vazio {
    text-align: center;
    padding: 40px 20px;
    background: var(--branco);
    border-radius: 18px;
    border: 1.5px solid var(--borda);
  }
  .aviso-vazio .emoji-vazio { font-size: 40px; margin-bottom: 12px; }
  .aviso-vazio .titulo-vazio {
    font-size: 15px;
    font-weight: 700;
    color: var(--texto);
    margin-bottom: 5px;
  }
  .aviso-vazio .descricao-vazio {
    font-size: 13px;
    color: var(--cinza);
    font-weight: 500;
  }

  /* navegacao inferior */
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: var(--altura-nav);
    background: #fff;
    border-top: 1.5px solid var(--borda);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 14px;
    transition: background .15s;
    flex: 1;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--fundo); }
  .nav-item svg { width: 22px; height: 22px; color: var(--cinza); }
  .nav-rotulo { font-size: 10.5px; font-weight: 600; color: var(--cinza); }
  .nav-item.ativo svg { color: var(--azul); }
  .nav-item.ativo .nav-rotulo { color: var(--azul); }

  .nav-criar-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--azul), var(--azul-claro));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(42,95,165,.4);
    cursor: pointer;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .nav-criar-btn:hover { transform: scale(1.08); }
  .nav-criar-btn svg { width: 22px; height: 22px; color: #fff; }
  .nav-centro { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-centro .nav-rotulo { color: var(--azul); font-weight: 700; }

  .ponto-aviso-wrap { position: relative; }
  .ponto-aviso-nav {
    position: absolute;
    top: -2px; right: -2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--laranja);
    border: 1.5px solid #fff;
  }

</style>
</head>
<body>

<div class="tela">

  <!-- cabecalho -->
  <header class="cabecalho">
    <div class="cabecalho-interno">

      <a href="playmatch.html" class="botao-voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>

      <div class="cabecalho-titulo">
        <h1>Notificações 🔔</h1>
        <p id="subtitulo-cabecalho">Carregando...</p>
      </div>

      <!-- badge de quantidade nao lidas -->
      <div class="badge-nao-lidas" id="badge-nao-lidas">0</div>

    </div>
  </header>

  <!-- conteudo -->
  <div class="conteudo">

    <!-- barra com resumo e botao de marcar todas -->
    <div class="barra-acoes">
      <span class="texto-resumo" id="texto-resumo">carregando...</span>
      <button class="botao-marcar-todas" id="botao-marcar-todas" onclick="marcarTodasComoLidas()">
        Marcar todas como lidas
      </button>
    </div>

    <!-- filtros -->
    <div class="filtros-notificacao">
      <button class="filtro-btn ativo" id="filtro-todas" onclick="trocarFiltro('todas')">Todas</button>
      <button class="filtro-btn" id="filtro-nao-lidas" onclick="trocarFiltro('nao-lidas')">Não lidas</button>
      <button class="filtro-btn" id="filtro-lidas" onclick="trocarFiltro('lidas')">Lidas</button>
    </div>

    <!-- lista onde as notificacoes aparecem -->
    <div class="lista-notificacoes" id="lista-notificacoes"></div>

  </div>

  <!-- navegacao inferior -->
  <nav class="nav">

    <a href="playmatch.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="nav-rotulo">Início</span>
    </a>

    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
      </svg>
      <span class="nav-rotulo">Mapa</span>
    </div>

    <div class="nav-centro">
      <div class="nav-criar-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
      <span class="nav-rotulo" style="color:var(--azul);font-weight:700;">Criar</span>
    </div>

    <div class="nav-item ativo">
      <div class="ponto-aviso-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="ponto-aviso-nav" id="ponto-nav"></span>
      </div>
      <span class="nav-rotulo" style="color:var(--azul);">Avisos</span>
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-rotulo">Perfil</span>
    </div>

  </nav>

</div>

<script>

  // ─── dados ficticios das notificacoes ───
  var todasAsNotificacoes = [
    {
      id: 1,
      tipo: "jogador",
      classeIcone: "tipo-jogador",
      emoji: "👤",
      titulo: "Novo jogador entrou na pelada!",
      descricao: "Pedro Gaya aceitou seu convite e entrou na partida de Futebol no Leblon.",
      horario: "Agora mesmo",

    },
    {
      id: 2,
      tipo: "confirma",
      classeIcone: "tipo-confirma",
      emoji: "✅",

      descricao: "Sua pelada de Futebol na Quadra do Leblon no sábado às 19h está confirmada.",

    },
    {

      titulo: "Última vaga disponível!",
      descricao: "Só resta 1 vaga na pelada de Futevôlei na Praia de Ipanema hoje às 16h.",
      horario: "12 min atrás",
      lida: false
    },
    {
      id: 4,
      tipo: "convite",
      classeIcone: "tipo-convite",
      emoji: "🎯",
      titulo: "Você foi convidado para uma pelada!",
      descricao: "Maria Clara te convidou para jogar Vôlei na Arena Copacabana amanhã às 18h.",
      horario: "30 min atrás",
      lida: false
    },
    {
      id: 5,
      tipo: "lembrete",
      classeIcone: "tipo-lembrete",
      emoji: "⏰",
      titulo: "Lembrete: partida em 2 horas!",
      descricao: "Sua partida de Basquete na Quadra do Flamengo começa às 17h. Não esqueça da água!",
      horario: "1 hora atrás",
      lida: false
    },
    {
      id: 6,
      tipo: "jogador",
      classeIcone: "tipo-jogador",
      emoji: "👤",
      titulo: "Ana Lima entrou na sua pelada",
      descricao: "Agora você tem 8 jogadores confirmados na partida de Futebol. Faltam 2!",
      horario: "2 horas atrás",
      lida: true
    },
    {
      id: 7,
      tipo: "cancela",
      classeIcone: "tipo-cancela",
      emoji: "❌",
      titulo: "Partida cancelada pelo organizador",
      descricao: "A pelada de Tênis no Clube Tijuca da terça às 08h foi cancelada. Verifique novas datas.",
      horario: "3 horas atrás",
      lida: true
    },
    {
      id: 8,
      tipo: "vaga",
      classeIcone: "tipo-vaga",
      emoji: "🏆",
      titulo: "Vaga preenchida com sucesso!",
      descricao: "Você entrou com sucesso na pelada de Futevôlei na Praia de Ipanema. Boa sorte!",
      horario: "Ontem, 18:45",
      lida: true
    },
    {
      id: 9,
      tipo: "lembrete",
      classeIcone: "tipo-lembrete",
      emoji: "⏰",
      titulo: "Não esqueça da sua pelada amanhã!",
      descricao: "Futebol Avançado na Arena Botafogo às 20h. Chegue 15 min antes para o aquecimento.",
      horario: "Ontem, 20:00",
      lida: true
    },
    {
      id: 10,
      tipo: "convite",
      classeIcone: "tipo-convite",
      emoji: "🎯",
      titulo: "Lucas Oliveira te mandou um convite",
      descricao: "Convite para jogar Vôlei de Praia no Recreio no domingo às 9h. 6 jogadores confirmados.",
      horario: "Ontem, 14:30",
      lida: true
    },
    {
      id: 11,
      tipo: "confirma",
      classeIcone: "tipo-confirma",
      emoji: "✅",
      titulo: "Avaliação recebida!",
      descricao: "João Silva avaliou sua participação com 5 estrelas. Continue assim!",
      horario: "2 dias atrás",
      lida: true
    }
  ];

  // filtro atual selecionado
  var filtroAtivo = "todas";

  // ─── conta quantas notificacoes nao foram lidas ───
  function contarNaoLidas() {
    var contador = 0;
    for (var i = 0; i < todasAsNotificacoes.length; i++) {
      if (todasAsNotificacoes[i].lida === false) {
        contador = contador + 1;
      }
    }
    return contador;
  }

  // ─── atualiza o badge e textos do cabecalho ───
  function atualizarCabecalho() {
    var quantidadeNaoLidas = contarNaoLidas();
    var badgeEl = document.getElementById("badge-nao-lidas");
    var subtituloEl = document.getElementById("subtitulo-cabecalho");
    var resumoEl = document.getElementById("texto-resumo");
    var botaoMarcarEl = document.getElementById("botao-marcar-todas");
    var pontoNavEl = document.getElementById("ponto-nav");

    // atualiza o badge
    badgeEl.innerText = quantidadeNaoLidas;
    if (quantidadeNaoLidas === 0) {
      badgeEl.classList.add("zerado");
      pontoNavEl.style.display = "none";
      botaoMarcarEl.disabled = true;
    } else {
      badgeEl.classList.remove("zerado");
      pontoNavEl.style.display = "block";
      botaoMarcarEl.disabled = false;
    }

    // atualiza o subtitulo do cabecalho
    if (quantidadeNaoLidas === 0) {
      subtituloEl.innerText = "Tudo em dia! 🎉";
    } else if (quantidadeNaoLidas === 1) {
      subtituloEl.innerText = "1 notificação não lida";
    } else {
      subtituloEl.innerText = quantidadeNaoLidas + " notificações não lidas";
    }

    // atualiza o resumo na barra de acoes
    var totalNotificacoes = todasAsNotificacoes.length;
    if (quantidadeNaoLidas === 0) {
      resumoEl.innerHTML = "Todas as <strong>" + totalNotificacoes + "</strong> foram lidas";
    } else {
      resumoEl.innerHTML = "<strong>" + quantidadeNaoLidas + "</strong> de " + totalNotificacoes + " não lidas";
    }
  }

  // ─── gera o HTML de uma notificacao ───
  function gerarHtmlNotificacao(notificacao, indice) {
    var classeLida = notificacao.lida ? "lida" : "nao-lida";
    var delayAnimacao = (indice * 0.05) + "s";

    var html = '<div class="notificacao ' + classeLida + ' entrando" ';
    html += 'id="notificacao-' + notificacao.id + '" ';
    html += 'style="animation-delay:' + delayAnimacao + '" ';
    html += 'onclick="clicarNaNotificacao(' + notificacao.id + ')">';

    // icone colorido
    html += '<div class="icone-notificacao ' + notificacao.classeIcone + '">';
    html += '<span style="font-size:20px">' + notificacao.emoji + '</span>';
    html += '</div>';

    // corpo com titulo, descricao e horario
    html += '<div class="corpo-notificacao">';
    html += '<div class="titulo-notificacao">' + notificacao.titulo + '</div>';
    html += '<div class="descricao-notificacao">' + notificacao.descricao + '</div>';
    html += '<div class="horario-notificacao">🕐 ' + notificacao.horario + '</div>';
    html += '</div>';

    // ponto azul de nao lida
    html += '<div class="ponto-nao-lida"></div>';

    html += '</div>';
    return html;
  }

  // ─── renderiza as notificacoes na tela de acordo com o filtro ───
  function renderizarNotificacoes() {
    var contenedor = document.getElementById("lista-notificacoes");
    contenedor.innerHTML = "";

    // filtra a lista conforme o filtro ativo
    var listaFiltrada = [];
    for (var i = 0; i < todasAsNotificacoes.length; i++) {
      var notificacao = todasAsNotificacoes[i];

      if (filtroAtivo === "todas") {
        listaFiltrada.push(notificacao);
      } else if (filtroAtivo === "nao-lidas" && notificacao.lida === false) {
        listaFiltrada.push(notificacao);
      } else if (filtroAtivo === "lidas" && notificacao.lida === true) {
        listaFiltrada.push(notificacao);
      }
    }

    // se nao tem nenhuma pra mostrar
    if (listaFiltrada.length === 0) {
      var mensagemVazia = "";
      if (filtroAtivo === "nao-lidas") {
        mensagemVazia = '<div class="aviso-vazio"><div class="emoji-vazio">🎉</div><div class="titulo-vazio">Tudo lido por aqui!</div><div class="descricao-vazio">Você não tem notificações não lidas no momento.</div></div>';
      } else if (filtroAtivo === "lidas") {
        mensagemVazia = '<div class="aviso-vazio"><div class="emoji-vazio">📭</div><div class="titulo-vazio">Nenhuma notificação lida</div><div class="descricao-vazio">As notificações que você ler aparecem aqui.</div></div>';
      } else {
        mensagemVazia = '<div class="aviso-vazio"><div class="emoji-vazio">🔔</div><div class="titulo-vazio">Sem notificações</div><div class="descricao-vazio">Você não tem notificações ainda.</div></div>';
      }
      contenedor.innerHTML = mensagemVazia;
      return;
    }

    // monta o html de cada notificacao
    var htmlFinal = "";
    for (var j = 0; j < listaFiltrada.length; j++) {
      htmlFinal = htmlFinal + gerarHtmlNotificacao(listaFiltrada[j], j);
    }
    contenedor.innerHTML = htmlFinal;
  }

  // ─── clicou numa notificacao — marca como lida ───
  function clicarNaNotificacao(idDaNotificacao) {
    var elementoNaTela = document.getElementById("notificacao-" + idDaNotificacao);

    // acha a notificacao na lista
    for (var i = 0; i < todasAsNotificacoes.length; i++) {
      if (todasAsNotificacoes[i].id === idDaNotificacao) {

        // ja estava lida, nao faz nada especial
        if (todasAsNotificacoes[i].lida === true) {
          return;
        }

        // marca como lida
        todasAsNotificacoes[i].lida = true;

        // faz a animacao visual de marcar como lida
        if (elementoNaTela !== null) {
          elementoNaTela.classList.remove("nao-lida");
          elementoNaTela.classList.add("lida");
          elementoNaTela.classList.add("lendo");

          // remove a classe de animacao depois que terminar
          setTimeout(function() {
            if (elementoNaTela !== null) {
              elementoNaTela.classList.remove("lendo");
            }
          }, 400);
        }

        break;
      }
    }

    // atualiza o cabecalho com a nova contagem
    atualizarCabecalho();

    // se o filtro for nao-lidas, remove o elemento da lista
    if (filtroAtivo === "nao-lidas") {
      setTimeout(function() {
        renderizarNotificacoes();
      }, 350);
    }
  }

  // ─── marca todas as notificacoes como lidas ───
  function marcarTodasComoLidas() {
    for (var i = 0; i < todasAsNotificacoes.length; i++) {
      todasAsNotificacoes[i].lida = true;
    }

    // atualiza tudo na tela
    atualizarCabecalho();
    renderizarNotificacoes();
  }

  // ─── troca o filtro ativo ───
  function trocarFiltro(nomeFiltro) {
    filtroAtivo = nomeFiltro;

    // tira o ativo de todos os botoes de filtro
    var botoesFiltro = document.querySelectorAll(".filtro-btn");
    for (var i = 0; i < botoesFiltro.length; i++) {
      botoesFiltro[i].classList.remove("ativo");
    }

    // coloca o ativo no botao clicado
    document.getElementById("filtro-" + nomeFiltro).classList.add("ativo");

    // re-renderiza a lista
    renderizarNotificacoes();
  }

  // ─── inicia a pagina ───
  atualizarCabecalho();
  renderizarNotificacoes();

</script>
</body>
</html>
