<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayMatch — Favoritos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  /* reset e variaveis */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul:        #2A5FA5;
    --azul-escuro: #1E4580;
    --azul-claro:  #4A7EC7;
    --laranja:     #F26419;
    --vermelho:    #EF4444;
    --rosa:        #EC4899;
    --verde:       #22C55E;
    --fundo:       #F4F6FA;
    --branco:      #FFFFFF;
    --texto:       #1A202C;
    --cinza:       #718096;
    --borda:       #E2E8F0;
    --fonte:       'Plus Jakarta Sans', sans-serif;
    --altura-nav:  68px;
  }

  html, body {
    font-family: var(--fonte);
    background: var(--fundo);
    color: var(--texto);
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }

  /* tela mobile */
  .tela {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--fundo);
    position: relative;
    overflow-x: hidden;
    padding-bottom: calc(var(--altura-nav) + 16px);
  }

  /* cabecalho azul */
  .cabecalho {
    background: linear-gradient(145deg, var(--azul-escuro) 0%, var(--azul) 60%, var(--azul-claro) 100%);
    padding: 52px 20px 60px;
    position: relative;
    overflow: hidden;
  }
  .cabecalho::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% -20%, rgba(255,255,255,.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .cabecalho::after {
    content: '';
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.08);
    top: -60px; right: -40px;
    pointer-events: none;
  }
  .cabecalho-interno {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .botao-voltar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,.18);
    border: 1.5px solid rgba(255,255,255,.28);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: background .2s;
  }
  .botao-voltar:hover { background: rgba(255,255,255,.28); }
  .botao-voltar svg { width: 18px; height: 18px; color: #fff; }

  .cabecalho-titulo h1 {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -.3px;
  }
  .cabecalho-titulo p {
    font-size: 13px;
    color: rgba(255,255,255,.72);
    font-weight: 500;
    margin-top: 2px;
  }

  /* conteudo */
  .conteudo {
    padding: 0 16px;
    margin-top: -30px;
  }

  /* titulo das secoes */
  .titulo-secao {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -.3px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .titulo-secao .contador-badge {
    font-size: 11.5px;
    font-weight: 700;
    background: var(--rosa);
    color: #fff;
    padding: 2px 8px;
    border-radius: 50px;
  }

  /* cartao de partida */
  .cartao {
    background: var(--branco);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    border: 1.5px solid var(--borda);
    transition: box-shadow .2s, transform .15s;
    position: relative;
  }
  .cartao:hover { box-shadow: 0 6px 20px rgba(0,0,0,.09); }

  /* animacao de entrada */
  .cartao.entrando {
    animation: entrarCartao .35s ease both;
  }
  @keyframes entrarCartao {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* animacao de saida ao desfavoritar */
  .cartao.saindo {
    animation: sairCartao .3s ease forwards;
  }
  @keyframes sairCartao {
    from { opacity: 1; transform: scale(1); max-height: 200px; }
    to   { opacity: 0; transform: scale(.95); max-height: 0; padding: 0; margin: 0; }
  }

  /* linha de topo do cartao */
  .cartao-topo {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .esporte-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .icone-esporte {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--fundo);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .nome-esporte { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
  .nivel-badge {
    display: inline-block;
    margin-top: 3px;
    padding: 2px 9px;
    border-radius: 50px;
    font-size: 11.5px;
    font-weight: 600;
  }
  .nivel-iniciante     { background: #DCFCE7; color: #16A34A; }
  .nivel-intermediario { background: #FEF3C7; color: #D97706; }
  .nivel-avancado      { background: #FEE2E2; color: #DC2626; }

  /* botao de favorito (coracao) */
  .botao-favorito {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--fundo);
    border: 1.5px solid var(--borda);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .2s, border-color .2s, transform .15s;
  }
  .botao-favorito:hover { transform: scale(1.1); }
  .botao-favorito:active { transform: scale(.9); }

  /* quando ta favoritado */
  .botao-favorito.favoritado {
    background: #FFF0F5;
    border-color: #FBCFE8;
  }
  .botao-favorito svg {
    width: 20px; height: 20px;
    transition: fill .2s, stroke .2s;
  }

  /* animacao de bater coracao */
  .botao-favorito.batendo {
    animation: batendoCoracao .35s ease;
  }
  @keyframes batendoCoracao {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.35); }
    60%  { transform: scale(.9); }
    100% { transform: scale(1); }
  }

  /* linhas de informacao dentro do cartao */
  .infos-cartao { display: flex; flex-direction: column; gap: 7px; }
  .linha-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--cinza);
    font-weight: 500;
  }
  .linha-info svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--cinza); }

  /* badge de vagas */
  .vagas-badge {
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    margin-top: 10px;
    display: inline-block;
  }
  .vagas-abertas { background: #EBF2FF; color: var(--azul); }
  .vagas-fechada { background: #FEE2E2; color: var(--vermelho); }

  /* caixa de favoritos vazia */
  .caixa-favoritos-vazios {
    background: var(--branco);
    border-radius: 18px;
    padding: 32px 20px;
    border: 1.5px dashed var(--borda);
    text-align: center;
    margin-bottom: 12px;
  }
  .caixa-favoritos-vazios .emoji-vazio { font-size: 38px; margin-bottom: 10px; }
  .caixa-favoritos-vazios .titulo-vazio {
    font-size: 15px;
    font-weight: 700;
    color: var(--texto);
    margin-bottom: 5px;
  }
  .caixa-favoritos-vazios .descricao-vazio {
    font-size: 13px;
    color: var(--cinza);
    font-weight: 500;
  }

  /* separador entre secoes */
  .separador {
    height: 1.5px;
    background: var(--borda);
    border-radius: 50px;
    margin: 20px 0 18px;
  }

  /* toast de notificacao */
  .toast {
    position: fixed;
    bottom: calc(var(--altura-nav) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--texto);
    color: #fff;
    font-family: var(--fonte);
    font-size: 13.5px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 50px;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    z-index: 200;
    white-space: nowrap;
    pointer-events: none;
    max-width: 90%;
  }
  .toast.visivel {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* navegacao inferior */
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: var(--altura-nav);
    background: #fff;
    border-top: 1.5px solid var(--borda);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 14px;
    transition: background .15s;
    flex: 1;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--fundo); }
  .nav-item svg { width: 22px; height: 22px; color: var(--cinza); }
  .nav-rotulo { font-size: 10.5px; font-weight: 600; color: var(--cinza); }
  .nav-item.ativo svg { color: var(--azul); }
  .nav-item.ativo .nav-rotulo { color: var(--azul); }

  .nav-criar-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--azul), var(--azul-claro));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(42,95,165,.4);
    cursor: pointer;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .nav-criar-btn:hover { transform: scale(1.08); }
  .nav-criar-btn svg { width: 22px; height: 22px; color: #fff; }
  .nav-centro { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-centro .nav-rotulo { color: var(--azul); font-weight: 700; }

  .ponto-aviso-wrap { position: relative; }
  .ponto-aviso {
    position: absolute;
    top: -2px; right: -2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--laranja);
    border: 1.5px solid #fff;
  }

</style>
</head>

    <div class="nav-item ativo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

      </svg>

    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

  // ─── pega os favoritos salvos no navegador ───
  function pegarFavoritosDoNavegador() {
    var dadosSalvos = localStorage.getItem("playMatchFavoritos");
    if (dadosSalvos === null) {
      return [];
    }
    return JSON.parse(dadosSalvos);
  }

  // ─── salva os favoritos no navegador ───
  function salvarFavoritosNoNavegador(listaDeIds) {
    localStorage.setItem("playMatchFavoritos", JSON.stringify(listaDeIds));
  }

  // ─── verifica se uma partida esta favoritada ───
  function estaFavoritada(idDaPartida) {
    var listaAtual = pegarFavoritosDoNavegador();
    for (var i = 0; i < listaAtual.length; i++) {
      if (listaAtual[i] === idDaPartida) {
        return true;
      }
    }
    return false;
  }

  // ─── gera o HTML do icone de coracao ───
  function gerarIconeCoracao(favoritado) {
    if (favoritado) {
      // coracao cheio (rosa)
      return '<svg viewBox="0 0 24 24" fill="#EC4899" stroke="#EC4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    } else {
      // coracao vazio (cinza)
      return '<svg viewBox="0 0 24 24" fill="none" stroke="#CBD5E0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    }
  }

  // ─── gera o HTML de um cartao de partida ───
  function gerarHtmlDoCartao(partida, favoritado, paraSecaoFavoritos) {
    var classeExtra = paraSecaoFavoritos ? "entrando" : "";

    var html = '<div class="cartao ' + classeExtra + '" id="cartao-' + (paraSecaoFavoritos ? "fav-" : "") + partida.id + '">';

    // topo com esporte e botao favorito
    html += '<div class="cartao-topo">';
    html += '<div class="esporte-info">';
    html += '<div class="icone-esporte">' + partida.icone + '</div>';
    html += '<div>';
    html += '<div class="nome-esporte">' + partida.esporte + '</div>';
    html += '<span class="nivel-badge ' + partida.classNivel + '">' + partida.nivel + '</span>';
    html += '</div>';
    html += '</div>';

    // botao do coracao
    var classBotao = favoritado ? "botao-favorito favoritado" : "botao-favorito";
    html += '<button class="' + classBotao + '" onclick="clicarNoCoracao(' + partida.id + ', this)">';
    html += gerarIconeCoracao(favoritado);
    html += '</button>';

    html += '</div>'; // fecha cartao-topo

    // informacoes da partida
    html += '<div class="infos-cartao">';

    html += '<div class="linha-info">';
    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
    html += partida.local;
    html += '</div>';

    html += '<div class="linha-info">';
    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
    html += partida.data;
    html += '</div>';

    html += '<div class="linha-info">';
    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
    html += partida.horario;
    html += '</div>';

    html += '</div>'; // fecha infos-cartao

    // badge de vagas
    html += '<span class="vagas-badge ' + partida.statusVagas + '">' + partida.vagas + '</span>';

    html += '</div>'; // fecha cartao

    return html;
  }

  // ─── mostra um toast rapidinho na tela ───
  var temporizadorDoToast = null;

  function mostrarToast(mensagem) {
    var elementoToast = document.getElementById("toast");
    elementoToast.innerText = mensagem;
    elementoToast.classList.add("visivel");

    // limpa o temporizador anterior se tiver
    if (temporizadorDoToast !== null) {
      clearTimeout(temporizadorDoToast);
    }

    // esconde depois de 2 segundos
    temporizadorDoToast = setTimeout(function() {
      elementoToast.classList.remove("visivel");
    }, 2000);
  }

  // ─── atualiza a secao de favoritos na tela ───
  function atualizarSecaoFavoritos() {
    var listaFavoritosEl = document.getElementById("lista-favoritos");
    var avisoVazioEl = document.getElementById("aviso-sem-favoritos");
    var contadorEl = document.getElementById("contador-favoritos");

    var idsFavoritos = pegarFavoritosDoNavegador();
    contadorEl.innerText = idsFavoritos.length;

    // limpa a secao de favoritos (exceto o aviso vazio)
    var cartoesAntigos = listaFavoritosEl.querySelectorAll(".cartao");
    for (var i = 0; i < cartoesAntigos.length; i++) {
      cartoesAntigos[i].remove();
    }

    if (idsFavoritos.length === 0) {
      // mostra o aviso de lista vazia
      avisoVazioEl.style.display = "block";
    } else {
      // esconde o aviso e mostra os cartoes favoritos
      avisoVazioEl.style.display = "none";

      for (var j = 0; j < idsFavoritos.length; j++) {
        var idFavorito = idsFavoritos[j];

        // acha a partida pelo id
        var partidaEncontrada = null;
        for (var k = 0; k < todasAsPartidas.length; k++) {
          if (todasAsPartidas[k].id === idFavorito) {
            partidaEncontrada = todasAsPartidas[k];
            break;
          }
        }

        if (partidaEncontrada !== null) {
          var divTemporaria = document.createElement("div");
          divTemporaria.innerHTML = gerarHtmlDoCartao(partidaEncontrada, true, true);
          listaFavoritosEl.appendChild(divTemporaria.firstChild);
        }
      }
    }
  }

  // ─── funcao chamada quando clica no coracao ───
  function clicarNoCoracao(idDaPartida, botaoClicado) {
    var listaAtual = pegarFavoritosDoNavegador();
    var jaEstaFavoritado = estaFavoritada(idDaPartida);

    // anima o coracao
    botaoClicado.classList.remove("batendo");
    void botaoClicado.offsetWidth; // reinicia animacao
    botaoClicado.classList.add("batendo");

    if (jaEstaFavoritado) {
      // remove dos favoritos
      var novaLista = [];
      for (var i = 0; i < listaAtual.length; i++) {
        if (listaAtual[i] !== idDaPartida) {
          novaLista.push(listaAtual[i]);
        }
      }
      salvarFavoritosNoNavegador(novaLista);

      // atualiza visual do botao na lista principal
      botaoClicado.classList.remove("favoritado");
      botaoClicado.innerHTML = gerarIconeCoracao(false);

      // remove o cartao da secao de favoritos com animacao
      var cartaoNoFavoritos = document.getElementById("cartao-fav-" + idDaPartida);
      if (cartaoNoFavoritos !== null) {
        cartaoNoFavoritos.classList.add("saindo");
        setTimeout(function() {
          atualizarSecaoFavoritos();
        }, 280);
      }

      mostrarToast("💔 Partida removida dos favoritos");

    } else {
      // adiciona nos favoritos
      listaAtual.push(idDaPartida);
      salvarFavoritosNoNavegador(listaAtual);

      // atualiza visual do botao na lista principal
      botaoClicado.classList.add("favoritado");
      botaoClicado.innerHTML = gerarIconeCoracao(true);

      // atualiza a secao de favoritos
      atualizarSecaoFavoritos();

      mostrarToast("❤️ Partida salva nos favoritos!");
    }

    // atualiza o contador do badge
    var novaListaAtualizada = pegarFavoritosDoNavegador();
    document.getElementById("contador-favoritos").innerText = novaListaAtualizada.length;
  }

  // ─── renderiza todas as partidas na tela ───
  function renderizarTodasAsPartidas() {
    var contenedor = document.getElementById("lista-todas-partidas");
    contenedor.innerHTML = "";

    for (var i = 0; i < todasAsPartidas.length; i++) {
      var partida = todasAsPartidas[i];
      var favoritado = estaFavoritada(partida.id);

      var divTemporaria = document.createElement("div");
      divTemporaria.innerHTML = gerarHtmlDoCartao(partida, favoritado, false);
      var cartaoGerado = divTemporaria.firstChild;

      // adiciona delay progressivo na animacao de entrada
      cartaoGerado.style.animationDelay = (i * 0.05) + "s";
      cartaoGerado.classList.add("entrando");

      contenedor.appendChild(cartaoGerado);
    }
  }

  // ─── inicia a pagina ───
  renderizarTodasAsPartidas();
  atualizarSecaoFavoritos();

</script>
</body>
</html>
